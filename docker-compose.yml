services:
  akashic-research-engine-db:
    image: postgres:16-alpine
    container_name: akashic-research-engine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-akashic_research_engine}
      POSTGRES_USER: ${POSTGRES_USER:-akashic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akashic_local_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - akashic-research-engine-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8

  akashic-research-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: akashic-research-engine:latest
    container_name: akashic-research-engine
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      akashic-research-engine-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3500
      HOST: 0.0.0.0
      DATABASE_URL: postgres://akashic:akashic_local_password@akashic-research-engine-db:5432/akashic_research_engine
    ports:
      - "127.0.0.1:3500:3500"
    labels:
      - traefik.enable=true
      - traefik.http.routers.akashic-research-engine-web.rule=Host(`akashicresearch.info`) || Host(`www.akashicresearch.info`)
      - traefik.http.routers.akashic-research-engine-web.entrypoints=web
      - traefik.http.routers.akashic-research-engine-web.middlewares=akashic-research-engine-https-redirect
      - traefik.http.routers.akashic-research-engine.rule=Host(`akashicresearch.info`) || Host(`www.akashicresearch.info`)
      - traefik.http.routers.akashic-research-engine.entrypoints=websecure
      - traefik.http.routers.akashic-research-engine.middlewares=akashic-research-engine-security-headers
      - traefik.http.routers.akashic-research-engine.tls=true
      - traefik.http.routers.akashic-research-engine.tls.certresolver=letsencrypt
      - traefik.http.middlewares.akashic-research-engine-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.akashic-research-engine-https-redirect.redirectscheme.permanent=true
      - traefik.http.middlewares.akashic-research-engine-security-headers.headers.stsseconds=31536000
      - traefik.http.middlewares.akashic-research-engine-security-headers.headers.stsincludesubdomains=true
      - traefik.http.middlewares.akashic-research-engine-security-headers.headers.forcestsheader=true
      - traefik.http.services.akashic-research-engine.loadbalancer.server.port=3500

volumes:
  akashic-research-engine-db-data:
